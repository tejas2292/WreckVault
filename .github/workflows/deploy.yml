# Deploy WreckVault to server on push to main (after checks pass)
name: CI and Deploy

on:
  push:
    branches: [main]

jobs:
  check:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client deps
        run: npm ci --prefix client

      - name: Lint client
        run: npm run lint --prefix client

      - name: Build client
        run: npm run build --prefix client

      - name: Install server deps
        run: npm ci --prefix server

  # Runs on YOUR runner (e.g. on your LAN). Set to 'true' once you add a self-hosted runner.
  deploy:
    name: Deploy to server
    if: false  # set to true when you have a self-hosted runner
    runs-on: self-hosted
    needs: check
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PROJECT_PATH }}
            git fetch origin
            git reset --hard origin/main
            git status
            docker compose pull --quiet 2>/dev/null || true
            docker compose up -d --build
